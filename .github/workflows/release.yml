name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run release:build
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
      - name: Verify release files
        shell: pwsh
        run: |
          Get-ChildItem dist-electron
          if (!(Test-Path "dist-electron/latest.yml")) {
            throw "dist-electron/latest.yml was not generated"
          }
          $latest = Get-Content "dist-electron/latest.yml" -Raw
          $pathMatch = [regex]::Match($latest, "(?m)^path:\s*(.+)\s*$")
          if (!$pathMatch.Success) {
            throw "dist-electron/latest.yml does not contain an installer path"
          }
          $installerName = $pathMatch.Groups[1].Value.Trim()
          if (!(Test-Path (Join-Path "dist-electron" $installerName))) {
            throw "latest.yml points to $installerName, but that file was not generated"
          }
          if (!(Test-Path (Join-Path "dist-electron" "$installerName.blockmap"))) {
            throw "latest.yml points to $installerName, but $installerName.blockmap was not generated"
          }
          if (!(Get-ChildItem "dist-electron/Foleyard-Setup-*.exe")) {
            throw "No Windows installer was generated"
          }
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist-electron/Foleyard-Setup-*.exe
            dist-electron/Foleyard-Setup-*.exe.blockmap
            dist-electron/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
